<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/contact.css" />
    <link rel="stylesheet" href="../css/common.css" />
    <title>RVCE Book Store</title>
  </head>
  <body>
    <header>
      <div class="container">
        <img
          src="http://172.16.34.33/WEB/logo-rvce.png"
          width="60px"
          height="60px"
          onclick="window.location.href='./index.html'"
          style="cursor: pointer;"
        />

        <nav class="navigation">
          <a href="./index.html">Home</a>
          <a href="./books.html">Books</a>
          <a href="./contact.html">Contact</a>
          <a href="./profile.html">Profile</a>
        </nav>
      </div>
    </header>

    <h2 class="heading">Contact Us</h2>
    <p class="sub-heading">
      Feel free to reach out for any queries or support.
    </p>

    <div class="contact-section">
      <div class="contact-card">
        <h3>Address</h3>
        <p>RV College of Engineering<br />Mysuru Road, Bengaluru</p>
      </div>

      <div class="contact-card">
        <h3>Email</h3>
        <p>library@rvce.edu.in</p>
      </div>

      <div class="contact-card">
        <h3>Phone</h3>
        <p>+91 98765 43210</p>
      </div>
    </div>

    <form class="contact-form">
      <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="form-group">
        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>
      <div class="button-group">
        <button
          type="submit"
          onclick="alert('Your message has been sent successfully!')"
        >
          Submit
        </button>

        <button type="reset">Reset</button>
      </div>
    </form>

    <footer>Copyright © 2025 RVCE. All rights reserved.</footer>
  </body>
</html>
